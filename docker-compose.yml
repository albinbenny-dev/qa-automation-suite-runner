name: qa-automation-suite-runner

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  qaasr-pgdata:
  qaasr-data:
  qaasr-scripts:
  qaasr-artifacts:

# ── Services ───────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  qaasr-postgres:
    image: postgres:16-alpine
    container_name: qaasr-postgres
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
      - POSTGRES_DB=${POSTGRES_DB:-qasr}
      - POSTGRES_USER=${POSTGRES_USER:-qasr}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - qaasr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-qasr}", "-d", "${POSTGRES_DB:-qasr}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - qaasr-net

  # ── Redis ────────────────────────────────────────────────────────────────
  qaasr-redis:
    image: redis:7-alpine
    container_name: qaasr-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qaasr-net

  # ── API ──────────────────────────────────────────────────────────────────
  qaasr-api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    image: qaasr-api:latest
    container_name: qaasr-api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "5555:5555"
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
      - NODE_ENV=development
      - PORT=4000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@qaasr-redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-qasr}:${POSTGRES_PASSWORD}@qaasr-postgres:5432/${POSTGRES_DB:-qasr}
      - CORS_ORIGIN=http://localhost:3000
      - RUNNER_URL=http://qaasr-runner:5001
      - RUNNER_PRIMARY_URL=http://qaasr-runner:5001
      - SCRIPTS_ROOT=/scripts
      - ARTIFACTS_ROOT=/artifacts
    depends_on:
      qaasr-redis:
        condition: service_healthy
      qaasr-postgres:
        condition: service_healthy
    volumes:
      - qaasr-data:/data
      - qaasr-scripts:/scripts
      - qaasr-artifacts:/artifacts
      - ./packages/api/src:/app/packages/api/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qaasr-net

  # ── Runner ───────────────────────────────────────────────────────────────
  qaasr-runner:
    build:
      context: .
      dockerfile: packages/runner/Dockerfile
    image: qaasr-runner:latest
    container_name: qaasr-runner
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
      - API_URL=http://qaasr-api:4000
    depends_on:
      qaasr-api:
        condition: service_healthy
    ports:
      - "6080:6080"
    volumes:
      - qaasr-scripts:/scripts
      - qaasr-artifacts:/artifacts
    networks:
      - qaasr-net

  # ── UI ───────────────────────────────────────────────────────────────────
  qaasr-ui:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    image: qaasr-ui:latest
    container_name: qaasr-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      qaasr-api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - qaasr-net

# ── Network ────────────────────────────────────────────────────────────────
networks:
  qaasr-net:
    driver: bridge
