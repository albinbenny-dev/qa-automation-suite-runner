name: qa-automation-suite-runner

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  qa-data:
    driver: local
  qa-pgdata:
    driver: local
  qa-scripts:
    driver: local
  qa-artifacts:
    driver: local

# ── Services ───────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  qaasr-postgres:
    image: postgres:16-alpine
    container_name: qaasr-postgres
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
      - POSTGRES_DB=${POSTGRES_DB:-qa_infinity}
      - POSTGRES_USER=${POSTGRES_USER:-qauser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - qa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-qauser}", "-d", "${POSTGRES_DB:-qa_infinity}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.1'
          memory: 256M
    networks:
      - qa-net

  # ── Redis ────────────────────────────────────────────────────────────────
  qaasr-redis:
    image: redis:7-alpine
    container_name: qaasr-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    environment:
      - TZ=Asia/Kolkata
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # No host port binding — services communicate over the internal qa-net network.
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - qa-net

  # ── API ──────────────────────────────────────────────────────────────────
  qaasr-api:
    image: qaasr-qa-api:latest
    container_name: qaasr-api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "5555:5555"   # Prisma Studio (dev only)
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
      - NODE_ENV=development
      - PORT=4000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@qaasr-redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-qauser}:${POSTGRES_PASSWORD}@qaasr-postgres:5432/${POSTGRES_DB:-qa_infinity}
      - CORS_ORIGIN=http://localhost:3000
      - RUNNER_URL=http://qaasr-runner:5001
      - RUNNER_PRIMARY_URL=http://qaasr-runner:5001
    depends_on:
      qaasr-redis:
        condition: service_healthy
      qaasr-postgres:
        condition: service_healthy
    volumes:
      - qa-data:/data
      - qa-scripts:/scripts
      - qa-artifacts:/artifacts
      # Mount source so tsx watch picks up changes without a full rebuild
      - ./packages/api/src:/app/packages/api/src:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "airtel6d-in-ventas-master-int-aavm-alpha-01.ocplab.6d.local:10.0.12.244"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1200M
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - qa-net

  # ── Runners (×3) ─────────────────────────────────────────────────────────
  # qaasr-runner is the primary runner; it exposes noVNC on port 6080 for live viewing.
  # qa-runner-2 and qa-runner-3 are headless replicas that share the same scripts
  # and artifacts volumes. All three sit behind qa-runner-lb.
  qaasr-runner:
    image: qaasr-qa-runner:latest
    container_name: qaasr-runner
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      qaasr-api:
        condition: service_healthy
    ports:
      - "6080:6080"    # noVNC live browser viewer — open in browser to watch tests run
    volumes:
      - qa-scripts:/scripts
      - qa-artifacts:/artifacts
    extra_hosts:
      - "airtel6d-in-ventas-master-int-aavm-alpha-01.ocplab.6d.local:10.0.12.244"
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    networks:
      - qa-net

  # ── UI ───────────────────────────────────────────────────────────────────
  qaasr-ui:
    image: qaasr-qa-ui:latest
    container_name: qaasr-ui
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "3000:80"
    depends_on:
      qaasr-api:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - qa-net

# ── Network ────────────────────────────────────────────────────────────────
networks:
  qa-net:
    driver: bridge
